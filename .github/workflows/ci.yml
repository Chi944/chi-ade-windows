name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    types: [opened, synchronize]

jobs:
  sherif:
    name: Sherif
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Sherif
        run: bunx sherif

  lint:
    name: Changed-file lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Lint changed files
        run: bun run scripts/lint-changed.ts

  test:
    name: Isolated Windows-fork tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Test focused suites in isolated processes
        run: |
          bun test packages/shared/src/agent-command.test.ts
          bun test apps/desktop/src/main/lib/cli-process-env.test.ts apps/desktop/src/main/lib/subscription-profiles.test.ts apps/desktop/src/main/lib/codex-account-usage.test.ts
          bun test apps/desktop/src/main/lib/provider-keys.test.ts apps/desktop/src/main/lib/provider-connections.test.ts apps/desktop/src/main/lib/runtime-availability.test.ts
          bun test apps/desktop/src/renderer/stores/diff-annotations.test.ts apps/desktop/src/renderer/screens/main/components/WorkspaceView/ContentView/TabsContent/Terminal/utils.test.ts
          bun test apps/desktop/src/lib/trpc/routers/external/helpers.test.ts apps/desktop/src/lib/trpc/routers/external/index.test.ts
          bun test apps/desktop/src/lib/trpc/routers/workspaces/procedures/create-agent.test.ts
          bun test apps/desktop/src/main/lib/agent-home.test.ts apps/desktop/src/main/lib/agent-repo.test.ts apps/desktop/src/main/lib/agent-scaffold.test.ts
          env -u OPENROUTER_API_KEY bun test apps/desktop/src/main/lib/terminal/env.test.ts
          bun test apps/desktop/src/main/lib/static-ports/loader.test.ts
          bun test apps/desktop/src/main/lib/agent-setup/shell-wrappers.test.ts
          bun test apps/desktop/src/lib/trpc/routers/workspaces/utils/teardown.test.ts
          bun test apps/desktop/src/main/lib/terminal-host/headless-emulator.test.ts apps/desktop/src/main/terminal-host/session.test.ts
          bun test apps/desktop/src/main/lib/terminal/service/service-manager.test.ts
          bun test apps/desktop/src/main/terminal-host/service.test.ts
          bun test apps/desktop/src/main/terminal-host/session-lifecycle.test.ts

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Typecheck
        run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Build Desktop
        run: bun turbo run build --filter=@ade/desktop

  platform-smoke:
    name: Platform smoke - ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            package_args: --win --x64
            target_arch: x64
          - name: macOS Apple Silicon
            runner: macos-15
            package_args: --mac --arm64
            target_arch: arm64
          - name: macOS Intel
            runner: macos-15-intel
            package_args: --mac --x64
            target_arch: x64
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Typecheck desktop
        run: bun run --cwd apps/desktop typecheck

      - name: Compile desktop
        run: bun run --cwd apps/desktop compile:app

      - name: Smoke native runtime
        run: bun run --cwd apps/desktop smoke:native

      - name: Package unsigned directory
        env:
          ADE_TARGET_ARCH: ${{ matrix.target_arch }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run --cwd apps/desktop package -- --dir ${{ matrix.package_args }} --publish never --config electron-builder.ts

      - name: Smoke packaged Windows runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:ELECTRON_RUN_AS_NODE = "1"
          $asar = (Resolve-Path "apps/desktop/release/win-unpacked/resources/app.asar").Path
          $env:ADE_SMOKE_MODULE_ROOT = "$asar/node_modules"
          & (Resolve-Path "apps/desktop/release/win-unpacked/ADE.exe").Path apps/desktop/scripts/smoke-native-runtime.cjs

      - name: Smoke packaged macOS runtime
        if: runner.os == 'macOS'
        run: |
          APP_DIR=$(find apps/desktop/release -maxdepth 3 -name '*.app' -type d | head -1)
          test -n "$APP_DIR" || { echo "::error::Packaged .app not found"; exit 1; }
          APP_DIR=$(cd "$APP_DIR" && pwd -P)
          EXECUTABLE=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_DIR/Contents/Info.plist")
          export ELECTRON_RUN_AS_NODE=1
          export ADE_SMOKE_MODULE_ROOT="$APP_DIR/Contents/Resources/app.asar/node_modules"
          "$APP_DIR/Contents/MacOS/$EXECUTABLE" apps/desktop/scripts/smoke-native-runtime.cjs
