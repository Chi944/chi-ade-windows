name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

jobs:
  sherif:
    name: Sherif
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Sherif
        run: bunx sherif

  lint:
    name: Changed-file lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Lint changed files
        run: bun run scripts/lint-changed.ts

  test:
    name: Isolated Windows-fork tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Test focused suites in isolated processes
        run: |
          bun test packages/shared/src/agent-command.test.ts
          bun test apps/desktop/src/lib/trpc/routers/external/helpers.test.ts apps/desktop/src/lib/trpc/routers/external/index.test.ts
          bun test apps/desktop/src/lib/trpc/routers/workspaces/procedures/create-agent.test.ts
          bun test apps/desktop/src/main/lib/agent-home.test.ts apps/desktop/src/main/lib/agent-repo.test.ts apps/desktop/src/main/lib/agent-scaffold.test.ts
          env -u OPENROUTER_API_KEY bun test apps/desktop/src/main/lib/terminal/env.test.ts
          bun test apps/desktop/src/main/lib/static-ports/loader.test.ts
          bun test apps/desktop/src/main/lib/agent-setup/shell-wrappers.test.ts
          bun test apps/desktop/src/lib/trpc/routers/workspaces/utils/teardown.test.ts
          bun test apps/desktop/src/main/lib/terminal-host/headless-emulator.test.ts apps/desktop/src/main/terminal-host/session.test.ts
          bun test apps/desktop/src/main/lib/terminal/daemon/daemon-manager.test.ts
          bun test apps/desktop/src/main/terminal-host/daemon.test.ts
          bun test apps/desktop/src/main/terminal-host/session-lifecycle.test.ts

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Typecheck
        run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Build Desktop
        run: bun turbo run build --filter=@ade/desktop
