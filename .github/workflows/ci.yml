name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  sherif:
    name: Sherif
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Sherif
        run: bunx sherif

  lint:
    name: Changed-file lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Lint changed files
        run: bun run scripts/lint-changed.ts

  test:
    name: Complete desktop tests - ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
          - name: macOS Apple Silicon
            runner: macos-15
          - name: macOS Intel
            runner: macos-15-intel
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Test every desktop suite in isolated processes
        run: bun run apps/desktop/scripts/test-complete.ts

      - name: Test shared runtime contracts
        run: bun test packages/shared/src

  production-audit:
    name: Production dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Enforce production dependency policy
        run: bun run audit:production

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Reject newly introduced high-severity dependencies
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Typecheck
        run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Build Desktop
        run: bun turbo run build --filter=@ade/desktop

  platform-smoke:
    name: Platform smoke - ${{ matrix.name }}
    needs: [typecheck, build]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            package_args: --win --x64
            target_arch: x64
          - name: macOS Apple Silicon
            runner: macos-15
            package_args: --mac --arm64
            target_arch: arm64
          - name: macOS Intel
            runner: macos-15-intel
            package_args: --mac --x64
            target_arch: x64
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Verify inbox OpenSSH tools on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ssh = Join-Path $env:WINDIR 'System32\OpenSSH\ssh.exe'
          $sftp = Join-Path $env:WINDIR 'System32\OpenSSH\sftp.exe'
          if (-not (Test-Path -LiteralPath $ssh)) { throw "Missing system OpenSSH client: $ssh" }
          if (-not (Test-Path -LiteralPath $sftp)) { throw "Missing system SFTP client: $sftp" }

      - name: Verify inbox OpenSSH tools on macOS
        if: runner.os == 'macOS'
        run: |
          test -x /usr/bin/ssh
          test -x /usr/bin/sftp

      - name: Assert remote filesystem test discovery
        run: >-
          bun -e "for (const file of ['apps/desktop/src/main/lib/remote/filesystem.test.ts', 'apps/desktop/src/main/lib/remote/filesystem.integration.test.ts']) if (!(await Bun.file(file).exists())) throw new Error('Remote filesystem test is missing: ' + file)"

      - name: Test remote filesystem and SSH worktree transport
        run: bun test apps/desktop/src/main/lib/remote/ssh.test.ts apps/desktop/src/main/lib/remote/filesystem.test.ts

      - name: Test live loopback OpenSSH and SFTP
        if: runner.os == 'macOS'
        run: bash .github/scripts/test-loopback-sftp.sh

      - name: Typecheck desktop
        run: bun run --cwd apps/desktop typecheck

      - name: Compile desktop
        run: bun run --cwd apps/desktop compile:app

      - name: Smoke native runtime
        run: bun run --cwd apps/desktop smoke:native

      - name: Package unsigned directory
        env:
          ADE_TARGET_ARCH: ${{ matrix.target_arch }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run --cwd apps/desktop package -- --dir ${{ matrix.package_args }} --publish never --config electron-builder.ts

      - name: Enforce packaged directory storage budget
        env:
          ADE_PACKAGE_DIR_ONLY: "true"
          ADE_TARGET_ARCH: ${{ matrix.target_arch }}
        run: bun run --cwd apps/desktop validate:package-footprint

      - name: Smoke packaged Windows GUI
        id: smoke_windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SMOKE_ARTIFACTS: ${{ runner.temp }}/ade-packaged-smoke-artifacts
        run: |
          $exe = (Resolve-Path "apps/desktop/release/win-unpacked/ADE.exe").Path
          bun run --cwd apps/desktop smoke:packaged-gui -- --platform win32 --app "$exe" --artifacts "$env:SMOKE_ARTIFACTS"

      - name: Smoke packaged macOS GUI
        id: smoke_macos
        if: runner.os == 'macOS'
        env:
          SMOKE_ARTIFACTS: ${{ runner.temp }}/ade-packaged-smoke-artifacts
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: |
          if [ "$TARGET_ARCH" = "arm64" ]; then
            EXECUTABLE="apps/desktop/release/mac-arm64/ADE.app/Contents/MacOS/ADE"
          else
            EXECUTABLE="apps/desktop/release/mac/ADE.app/Contents/MacOS/ADE"
          fi
          test -x "$EXECUTABLE" || { echo "::error::Packaged executable not found: $EXECUTABLE"; exit 1; }
          EXECUTABLE=$(cd "$(dirname "$EXECUTABLE")" && pwd -P)/ADE
          bun run --cwd apps/desktop smoke:packaged-gui -- --platform darwin --app "$EXECUTABLE" --artifacts "$SMOKE_ARTIFACTS"

      - name: Upload packaged GUI smoke failure
        if: always() && (steps.smoke_windows.outcome == 'failure' || steps.smoke_macos.outcome == 'failure')
        uses: actions/upload-artifact@v7
        with:
          name: packaged-gui-smoke-${{ runner.os }}-${{ matrix.target_arch }}
          path: ${{ runner.temp }}/ade-packaged-smoke-artifacts
          retention-days: 3
          if-no-files-found: ignore
