name: CI

on:
  push:
    branches: [main, "agent/**", "codex/**"]
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  sherif:
    name: Sherif
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Sherif
        run: bunx sherif

  lint:
    name: Changed-file lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Lint changed files
        run: bun run scripts/lint-changed.ts

  test:
    name: Complete desktop tests - Windows
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Test every desktop suite in isolated processes
        run: bun run apps/desktop/scripts/test-complete.ts

      - name: Test shared runtime contracts
        run: bun test packages/shared/src

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Typecheck
        run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Build Desktop
        run: bun turbo run build --filter=@ade/desktop

  platform-smoke:
    name: Platform smoke - ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            package_args: --win --x64
            target_arch: x64
          - name: macOS Apple Silicon
            runner: macos-15
            package_args: --mac --arm64
            target_arch: arm64
          - name: macOS Intel
            runner: macos-15-intel
            package_args: --mac --x64
            target_arch: x64
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Verify inbox OpenSSH tools on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ssh = Join-Path $env:WINDIR 'System32\OpenSSH\ssh.exe'
          $sftp = Join-Path $env:WINDIR 'System32\OpenSSH\sftp.exe'
          if (-not (Test-Path -LiteralPath $ssh)) { throw "Missing system OpenSSH client: $ssh" }
          if (-not (Test-Path -LiteralPath $sftp)) { throw "Missing system SFTP client: $sftp" }

      - name: Verify inbox OpenSSH tools on macOS
        if: runner.os == 'macOS'
        run: |
          test -x /usr/bin/ssh
          test -x /usr/bin/sftp

      - name: Assert remote filesystem test discovery
        run: >-
          bun -e "for (const file of ['apps/desktop/src/main/lib/remote/filesystem.test.ts', 'apps/desktop/src/main/lib/remote/filesystem.integration.test.ts']) if (!(await Bun.file(file).exists())) throw new Error('Remote filesystem test is missing: ' + file)"

      - name: Test remote filesystem and SSH worktree transport
        run: bun test apps/desktop/src/main/lib/remote/ssh.test.ts apps/desktop/src/main/lib/remote/filesystem.test.ts

      - name: Test live loopback OpenSSH and SFTP
        if: runner.os == 'macOS'
        run: bash .github/scripts/test-loopback-sftp.sh

      - name: Typecheck desktop
        run: bun run --cwd apps/desktop typecheck

      - name: Compile desktop
        run: bun run --cwd apps/desktop compile:app

      - name: Smoke native runtime
        run: bun run --cwd apps/desktop smoke:native

      - name: Package unsigned directory
        env:
          ADE_TARGET_ARCH: ${{ matrix.target_arch }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run --cwd apps/desktop package -- --dir ${{ matrix.package_args }} --publish never --config electron-builder.ts

      - name: Enforce packaged directory storage budget
        env:
          ADE_PACKAGE_DIR_ONLY: "true"
          ADE_TARGET_ARCH: ${{ matrix.target_arch }}
        run: bun run --cwd apps/desktop validate:package-footprint

      - name: Smoke packaged Windows runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:ELECTRON_RUN_AS_NODE = "1"
          $asar = (Resolve-Path "apps/desktop/release/win-unpacked/resources/app.asar").Path
          $env:ADE_SMOKE_MODULE_ROOT = "$asar/node_modules"
          $exe = (Resolve-Path "apps/desktop/release/win-unpacked/ADE.exe").Path
          $smokeScript = (Resolve-Path "apps/desktop/scripts/smoke-native-runtime.cjs").Path
          $process = Start-Process -FilePath $exe -ArgumentList @($smokeScript) -Wait -PassThru -NoNewWindow
          if ($process.ExitCode -ne 0) { throw "Packaged Windows runtime smoke failed with exit code $($process.ExitCode)" }

      - name: Smoke packaged macOS runtime
        if: runner.os == 'macOS'
        run: |
          APP_DIR=$(find apps/desktop/release -maxdepth 3 -name '*.app' -type d | head -1)
          test -n "$APP_DIR" || { echo "::error::Packaged .app not found"; exit 1; }
          APP_DIR=$(cd "$APP_DIR" && pwd -P)
          EXECUTABLE=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_DIR/Contents/Info.plist")
          export ELECTRON_RUN_AS_NODE=1
          export ADE_SMOKE_MODULE_ROOT="$APP_DIR/Contents/Resources/app.asar/node_modules"
          "$APP_DIR/Contents/MacOS/$EXECUTABLE" apps/desktop/scripts/smoke-native-runtime.cjs
