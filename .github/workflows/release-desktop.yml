name: Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"
permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-desktop.yml
    with:
      channel: stable
      electron_builder_config: electron-builder.ts
      artifact_prefix: desktop
      artifact_retention_days: 30
    secrets: inherit

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches desktop version
        run: |
          [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "::error::Stable releases require an exact vMAJOR.MINOR.PATCH tag"
            exit 1
          }
          EXPECTED_TAG="v$(node -p "require('./apps/desktop/package.json').version")"
          test "${{ github.ref_name }}" = "$EXPECTED_TAG" || {
            echo "::error::Tag ${{ github.ref_name }} does not match apps/desktop version $EXPECTED_TAG"
            exit 1
          }

      - name: Find previous release tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          # Get all desktop tags sorted by version, find the one before current
          PREVIOUS_TAG=$(git tag -l 'v*' | sort -V | grep -B1 "^${CURRENT_TAG}$" | head -1)
          if [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ] || [ -z "$PREVIOUS_TAG" ]; then
            # Current tag is the first or no previous found, get the oldest desktop tag
            PREVIOUS_TAG=""
          fi
          echo "current_tag=${CURRENT_TAG}" >> $GITHUB_OUTPUT
          echo "previous_tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT
          echo "Current tag: ${CURRENT_TAG}"
          echo "Previous tag: ${PREVIOUS_TAG:-none}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: Create stable-named copies for latest download URLs
        run: |
          cd release-artifacts
          # Create stable-named copies (without version) for /releases/latest/download/ URLs
          for file in *.dmg; do
            if [[ -f "$file" ]]; then
              # Extract architecture from filename (e.g., ADE-1.0.3-arm64.dmg -> arm64)
              arch=$(echo "$file" | sed -E 's/.*-([^-]+)\.dmg$/\1/')
              cp "$file" "ADE-${arch}.dmg"
              echo "Created stable copy: ADE-${arch}.dmg"
            fi
          done
          for file in *.zip; do
            if [[ -f "$file" ]]; then
              # Extract architecture from filename (e.g., ADE-1.0.3-arm64.zip -> arm64)
              arch=$(echo "$file" | sed -E 's/.*-([^-]+)\.zip$/\1/')
              cp "$file" "ADE-${arch}-mac.zip"
              echo "Created stable copy: ADE-${arch}-mac.zip"
            fi
          done
          for file in *.AppImage; do
            if [[ -f "$file" ]]; then
              # Extract architecture from filename (e.g., ade-1.0.3-x64.AppImage -> x64)
              arch=$(echo "$file" | sed -E 's/.*-([^-]+)\.AppImage$/\1/')
              cp "$file" "ADE-${arch}.AppImage"
              echo "Created stable copy: ADE-${arch}.AppImage"
            fi
          done
          for file in *.exe; do
            if [[ -f "$file" && "$file" != *.__uninstaller.exe ]]; then
              # Extract architecture from filename (e.g., ADE-1.0.3-x64.exe -> x64)
              arch=$(echo "$file" | sed -E 's/.*-([^-]+)\.exe$/\1/')
              cp "$file" "ADE-${arch}.exe"
              echo "Created stable copy: ADE-${arch}.exe"
            fi
          done
          # Keep Linux updater manifest at a stable filename for generic provider lookups.
          for file in *-linux.yml; do
            if [[ -f "$file" && "$file" != "latest-linux.yml" ]]; then
              cp "$file" "latest-linux.yml"
              echo "Created stable copy: latest-linux.yml"
              break
            fi
          done
          echo "Release artifacts:"
          ls -la

      - name: Validate atomic updater release
        working-directory: release-artifacts
        run: |
          for manifest in latest.yml latest-arm64-mac.yml latest-x64-mac.yml latest-linux.yml; do
            test -f "$manifest" || { echo "::error::Missing $manifest"; exit 1; }
          done
          test -n "$(find . -maxdepth 1 -name '*.exe' -type f -print -quit)" || { echo "::error::Missing Windows installer"; exit 1; }
          test -n "$(find . -maxdepth 1 -name '*.exe.blockmap' -type f -print -quit)" || { echo "::error::Missing Windows differential blockmap"; exit 1; }
          test -n "$(find . -maxdepth 1 -name '*arm64*.zip' -type f -print -quit)" || { echo "::error::Missing Apple Silicon ZIP"; exit 1; }
          test -n "$(find . -maxdepth 1 -name '*x64*.zip' -type f -print -quit)" || { echo "::error::Missing Intel Mac ZIP"; exit 1; }
          sha256sum * > SHA256SUMS.txt

      - name: Generate release notes
        id: release_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_TAG="${{ steps.prev_tag.outputs.previous_tag }}"
          CURRENT_TAG="${{ steps.prev_tag.outputs.current_tag }}"

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Generating notes from ${PREVIOUS_TAG} to ${CURRENT_TAG}"
            NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${CURRENT_TAG}" \
              -f previous_tag_name="${PREVIOUS_TAG}" \
              --jq '.body')
          else
            echo "No previous tag found, generating notes without comparison"
            NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${CURRENT_TAG}" \
              --jq '.body')
          fi

          # Write to file to preserve formatting
          echo "$NOTES" > release_notes.md
          echo "Release notes generated"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release-artifacts/* \
            --title "ADE ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            --verify-tag
