name: Build Desktop App

on:
  workflow_call:
    inputs:
      channel:
        description: "Release channel (stable or canary)"
        required: true
        type: string
      version_suffix:
        description: "Version suffix to append (e.g., -canary). Empty for stable."
        required: false
        type: string
        default: ""
      electron_builder_config:
        description: "Electron builder config file"
        required: false
        type: string
        default: "electron-builder.ts"
      artifact_prefix:
        description: "Prefix for artifact names"
        required: false
        type: string
        default: "desktop"
      artifact_retention_days:
        description: "Number of days to retain artifacts"
        required: false
        type: number
        default: 30

jobs:
  build-macos:
    name: Build - macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    environment: production

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen

      - name: Smoke-test macOS native prebuilds
        run: bun run --cwd apps/desktop smoke:native

      - name: Require Apple signing for stable releases
        if: inputs.channel == 'stable'
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$CSC_LINK" || { echo "::error::MAC_CERTIFICATE is required for stable releases"; exit 1; }
          test -n "$CSC_KEY_PASSWORD" || { echo "::error::MAC_CERTIFICATE_PASSWORD is required"; exit 1; }
          test -n "$APPLE_ID" || { echo "::error::APPLE_ID is required"; exit 1; }
          test -n "$APPLE_APP_SPECIFIC_PASSWORD" || { echo "::error::APPLE_ID_PASSWORD is required"; exit 1; }
          test -n "$APPLE_TEAM_ID" || { echo "::error::APPLE_TEAM_ID is required"; exit 1; }

      - name: Set version suffix
        if: inputs.version_suffix != ''
        working-directory: apps/desktop
        run: |
          # Read current version and append suffix
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION="${CURRENT_VERSION}${{ inputs.version_suffix }}"
          echo "Setting version to: $NEW_VERSION"
          # Update package.json version using node
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "
          echo "Updated package.json version to $NEW_VERSION"

      - name: Clean dev folder
        working-directory: apps/desktop
        run: bun run clean:dev

      - name: Compile app with electron-vite
        working-directory: apps/desktop
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DOCS_URL: ${{ secrets.NEXT_PUBLIC_DOCS_URL }}
          NEXT_PUBLIC_STREAMS_URL: ${{ secrets.NEXT_PUBLIC_STREAMS_URL }}
          SENTRY_DSN_DESKTOP: ${{ secrets.SENTRY_DSN_DESKTOP }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SUPERSET_WORKSPACE_NAME: superset
        run: bun run compile:app

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          ADE_TARGET_ARCH: ${{ matrix.arch }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run package -- --mac --${{ matrix.arch }} --publish never --config ${{ inputs.electron_builder_config }}

      - name: Smoke-test packaged macOS native modules
        working-directory: apps/desktop
        run: |
          APP_DIR=$(find release -maxdepth 3 -name '*.app' -type d | head -1)
          test -n "$APP_DIR" || { echo "::error::Packaged .app not found"; exit 1; }
          APP_DIR=$(cd "$APP_DIR" && pwd -P)
          EXECUTABLE=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_DIR/Contents/Info.plist")
          test -n "$EXECUTABLE" || { echo "::error::CFBundleExecutable is missing"; exit 1; }
          export ELECTRON_RUN_AS_NODE=1
          export ADE_SMOKE_MODULE_ROOT="$APP_DIR/Contents/Resources/app.asar/node_modules"
          "$APP_DIR/Contents/MacOS/$EXECUTABLE" scripts/smoke-native-runtime.cjs

      - name: Verify signature
        if: inputs.channel == 'stable'
        working-directory: apps/desktop
        run: |
          APP_DIR=$(find release -maxdepth 3 -name '*.app' -type d | head -1)
          codesign --verify --deep --strict --verbose=2 "$APP_DIR"

      - name: Verify app-update.yml exists
        working-directory: apps/desktop
        run: |
          APP_DIR=$(find release -maxdepth 3 -name '*.app' -type d | head -1)
          test -f "$APP_DIR/Contents/Resources/app-update.yml" || {
            echo "::error::app-update.yml missing from $APP_DIR/Contents/Resources/ — auto-update will be broken"
            exit 1
          }

      - name: Name architecture-specific update manifest
        working-directory: apps/desktop
        run: |
          MANIFEST=$(find release -maxdepth 1 -name '*-mac.yml' -type f | head -1)
          test -n "$MANIFEST" || { echo "::error::macOS update manifest missing"; exit 1; }
          cp "$MANIFEST" "release/latest-${{ matrix.arch }}-mac.yml"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-mac-${{ matrix.arch }}-dmg
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.dmg.blockmap
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-mac-${{ matrix.arch }}-zip
          path: |
            apps/desktop/release/*.zip
            apps/desktop/release/*.zip.blockmap
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload auto-update manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-mac-${{ matrix.arch }}-update-manifest
          path: apps/desktop/release/latest-${{ matrix.arch }}-mac.yml
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

  build-linux:
    name: Build - Linux (x64)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen

      - name: Set version suffix
        if: inputs.version_suffix != ''
        working-directory: apps/desktop
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION="${CURRENT_VERSION}${{ inputs.version_suffix }}"
          echo "Setting version to: $NEW_VERSION"
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "
          echo "Updated package.json version to $NEW_VERSION"

      - name: Clean dev folder
        working-directory: apps/desktop
        run: bun run clean:dev

      - name: Compile app with electron-vite
        working-directory: apps/desktop
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DOCS_URL: ${{ secrets.NEXT_PUBLIC_DOCS_URL }}
          NEXT_PUBLIC_STREAMS_URL: ${{ secrets.NEXT_PUBLIC_STREAMS_URL }}
          NEXT_PUBLIC_ELECTRIC_URL: ${{ secrets.NEXT_PUBLIC_ELECTRIC_URL }}
          SENTRY_DSN_DESKTOP: ${{ secrets.SENTRY_DSN_DESKTOP }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SUPERSET_WORKSPACE_NAME: superset
        run: bun run compile:app

      - name: Build Electron app
        working-directory: apps/desktop
        run: bun run package -- --publish never --config ${{ inputs.electron_builder_config }}

      - name: Verify Linux AppImage + update manifest exist
        working-directory: apps/desktop
        run: |
          ls -la release
          test -n "$(ls -1 release/*.AppImage 2>/dev/null)" || {
            echo "::error::No AppImage artifact generated in apps/desktop/release"
            exit 1
          }
          test -n "$(ls -1 release/*-linux.yml 2>/dev/null)" || {
            echo "::error::No Linux auto-update manifest generated in apps/desktop/release"
            exit 1
          }

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-linux-appimage
          path: apps/desktop/release/*.AppImage
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload Linux auto-update manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-linux-update-manifest
          path: apps/desktop/release/*-linux.yml
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

  build-windows:
    name: Build - Windows (x64)
    runs-on: windows-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen

      - name: Smoke-test Windows native prebuilds
        run: bun run --cwd apps/desktop smoke:native

      - name: Set version suffix
        if: inputs.version_suffix != ''
        working-directory: apps/desktop
        shell: bash
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION="${CURRENT_VERSION}${{ inputs.version_suffix }}"
          echo "Setting version to: $NEW_VERSION"
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "
          echo "Updated package.json version to $NEW_VERSION"

      - name: Clean dev folder
        working-directory: apps/desktop
        run: bun run clean:dev

      - name: Compile app with electron-vite
        working-directory: apps/desktop
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DOCS_URL: ${{ secrets.NEXT_PUBLIC_DOCS_URL }}
          NEXT_PUBLIC_STREAMS_URL: ${{ secrets.NEXT_PUBLIC_STREAMS_URL }}
          NEXT_PUBLIC_ELECTRIC_URL: ${{ secrets.NEXT_PUBLIC_ELECTRIC_URL }}
          SENTRY_DSN_DESKTOP: ${{ secrets.SENTRY_DSN_DESKTOP }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SUPERSET_WORKSPACE_NAME: superset
        run: bun run compile:app

      - name: Require Windows signing for stable releases
        if: inputs.channel == 'stable'
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if (-not $env:WIN_CSC_LINK) {
            throw "WIN_CSC_LINK is required for stable releases"
          }
          if (-not $env:WIN_CSC_KEY_PASSWORD) {
            throw "WIN_CSC_KEY_PASSWORD is required for stable releases"
          }

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: bun run package -- --publish never --config ${{ inputs.electron_builder_config }}

      - name: Smoke-test packaged Windows native modules
        shell: pwsh
        run: |
          $env:ELECTRON_RUN_AS_NODE = "1"
          $asar = (Resolve-Path "apps/desktop/release/win-unpacked/resources/app.asar").Path
          $env:ADE_SMOKE_MODULE_ROOT = "$asar/node_modules"
          $exeName = if ("${{ inputs.channel }}" -eq "canary") { "ADE Canary.exe" } else { "ADE.exe" }
          $exe = (Resolve-Path "apps/desktop/release/win-unpacked/$exeName").Path
          & $exe apps/desktop/scripts/smoke-native-runtime.cjs

      - name: Verify Windows installer + update manifest exist
        working-directory: apps/desktop
        shell: pwsh
        run: |
          Get-ChildItem release
          if (-not (Get-ChildItem release -Filter "*.exe" -File)) {
            Write-Error "No Windows installer generated in apps/desktop/release"
          }
          if (-not (Test-Path release/latest.yml)) {
            Write-Error "No Windows auto-update manifest generated in apps/desktop/release"
          }

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-windows-installer
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.exe.blockmap
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload Windows auto-update manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-windows-update-manifest
          path: apps/desktop/release/latest.yml
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error
