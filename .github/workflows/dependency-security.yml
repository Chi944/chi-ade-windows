name: Dependency Security

on:
  schedule:
    - cron: "17 4 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-security
  cancel-in-progress: false

jobs:
  production-audit:
    name: Monthly production dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install frozen dependencies
        run: bun install --frozen

      - name: Enforce production dependency policy
        run: bun run audit:production
