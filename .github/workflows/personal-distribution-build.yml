name: Direct Download Build

run-name: Direct download build from ${{ github.ref_name }} by @${{ github.actor }}

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: direct-download
  cancel-in-progress: false

jobs:
  validate:
    name: Validate publication branch
    runs-on: ubuntu-latest
    steps:
      - name: Require main
        run: |
          test "$GITHUB_REF" = "refs/heads/main" || {
            echo "::error::Direct downloads can only be published from main"
            exit 1
          }

      - name: Require protected rolling release tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/${{ github.repository }}/git/ref/tags/personal-latest" --silent

      - name: Require successful CI for exact SHA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUNS=$(gh api \
            --method GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
            -f head_sha="$GITHUB_SHA" \
            -f branch="main" \
            -f event="push" \
            -f status="completed" \
            -f per_page="100")
          MATCHES=$(jq \
            --arg sha "$GITHUB_SHA" \
            '[.workflow_runs[] | select(
              .head_sha == $sha and
              .head_branch == "main" and
              .event == "push" and
              .status == "completed" and
              .conclusion == "success"
            )] | length' <<< "$RUNS")
          test "$MATCHES" -ge 1 || {
            echo "::error::No successful completed CI push run exists for exact SHA $GITHUB_SHA"
            exit 1
          }

  package:
    needs: validate
    name: Package unsigned - ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            target_arch: x64
            package_args: --win --x64
            artifact_name: direct-windows-x64
            checksum_name: SHA256SUMS-windows-x64.txt
          - name: macOS Apple Silicon
            runner: macos-15
            target_arch: arm64
            package_args: --mac --arm64
            artifact_name: direct-macos-arm64
            checksum_name: SHA256SUMS-macos-arm64.txt
          - name: macOS Intel
            runner: macos-15-intel
            target_arch: x64
            package_args: --mac --x64
            artifact_name: direct-macos-x64
            checksum_name: SHA256SUMS-macos-x64.txt

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Typecheck desktop
        run: bun run --cwd apps/desktop typecheck

      - name: Test cross-platform terminal launch paths
        run: >-
          bun test
          apps/desktop/src/renderer/lib/terminal/launch-command.test.ts
          apps/desktop/src/renderer/react-query/workspaces/bootstrap-open-worktree.test.ts
          apps/desktop/src/main/lib/agent-setup/agent-wrappers.test.ts
          apps/desktop/src/main/lib/terminal/service/service-manager.test.ts

      - name: Test category config path safety
        run: >-
          bun test
          apps/desktop/src/lib/trpc/routers/config/config.test.ts
          apps/desktop/src/lib/trpc/routers/config/project-config-files.test.ts

      - name: Test verified personal update channel
        run: >-
          bun test --isolate
          apps/desktop/src/shared/personal-update.test.ts
          apps/desktop/src/main/lib/personal-update-downloader.test.ts
          apps/desktop/src/main/lib/personal-auto-updater.test.ts
          apps/desktop/src/main/lib/recovery/update-snapshot.test.ts
          apps/desktop/src/main/lib/local-db/backup.test.ts

      - name: Test personal update publication contract
        run: node --test .github/scripts/create-personal-update-manifest.test.cjs

      - name: Compile desktop
        env:
          ADE_BUILD_SHA: ${{ github.sha }}
          ADE_BUILD_NUMBER: ${{ github.run_number }}
        run: bun run --cwd apps/desktop compile:app

      - name: Smoke native runtime
        run: bun run --cwd apps/desktop smoke:native

      - name: Package unsigned Windows installer
        if: runner.os == 'Windows'
        env:
          ADE_TARGET_ARCH: ${{ matrix.target_arch }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run --cwd apps/desktop package -- ${{ matrix.package_args }} --publish never --config electron-builder.ts

      - name: Package unsigned macOS installers
        if: runner.os == 'macOS'
        env:
          ADE_TARGET_ARCH: ${{ matrix.target_arch }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          for attempt in 1 2; do
            if bun run --cwd apps/desktop package -- ${{ matrix.package_args }} --publish never --config electron-builder.ts; then
              exit 0
            fi
            if [ "$attempt" -eq 2 ]; then
              echo "::error::macOS packaging failed twice"
              exit 1
            fi
            echo "::warning::macOS packaging hit a transient failure; retrying once after temporary disk images settle"
            sleep 15
          done

      - name: Confirm macOS build has no Developer ID signature
        if: runner.os == 'macOS'
        run: |
          APP_DIR=$(find apps/desktop/release -maxdepth 3 -name '*.app' -type d | head -1)
          test -n "$APP_DIR" || { echo "::error::Packaged .app not found"; exit 1; }
          if codesign --verify --deep --strict "$APP_DIR" 2>/dev/null && \
             codesign -dv --verbose=4 "$APP_DIR" 2>&1 | grep -q 'Authority=Developer ID Application:'; then
            echo "::error::Personal macOS artifact unexpectedly has a Developer ID signature"
            exit 1
          fi

      - name: Confirm Windows installer is unsigned
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem "apps/desktop/release" -Filter "*.exe" -File |
            Where-Object Name -NotLike "*.__uninstaller.exe" |
            Select-Object -First 1
          if (-not $installer) { throw "Windows installer not found" }
          $signature = Get-AuthenticodeSignature -LiteralPath $installer.FullName
          if ($signature.SignerCertificate) {
            throw "Personal Windows artifact unexpectedly has an Authenticode signature"
          }

      - name: Smoke packaged Windows runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:ELECTRON_RUN_AS_NODE = "1"
          $asar = (Resolve-Path "apps/desktop/release/win-unpacked/resources/app.asar").Path
          $env:ADE_SMOKE_MODULE_ROOT = "$asar/node_modules"
          $exe = (Resolve-Path "apps/desktop/release/win-unpacked/ADE.exe").Path
          $smokeScript = (Resolve-Path "apps/desktop/scripts/smoke-native-runtime.cjs").Path
          $process = Start-Process -FilePath $exe -ArgumentList @($smokeScript) -Wait -PassThru -NoNewWindow
          if ($process.ExitCode -ne 0) { throw "Packaged Windows runtime smoke failed with exit code $($process.ExitCode)" }

      - name: Smoke packaged macOS runtime
        if: runner.os == 'macOS'
        run: |
          APP_DIR=$(find apps/desktop/release -maxdepth 3 -name '*.app' -type d | head -1)
          test -n "$APP_DIR" || { echo "::error::Packaged .app not found"; exit 1; }
          APP_DIR=$(cd "$APP_DIR" && pwd -P)
          EXECUTABLE=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_DIR/Contents/Info.plist")
          test -n "$EXECUTABLE" || { echo "::error::CFBundleExecutable is missing"; exit 1; }
          export ELECTRON_RUN_AS_NODE=1
          export ADE_SMOKE_MODULE_ROOT="$APP_DIR/Contents/Resources/app.asar/node_modules"
          "$APP_DIR/Contents/MacOS/$EXECUTABLE" apps/desktop/scripts/smoke-native-runtime.cjs

      - name: Enforce personal package storage budget
        env:
          ADE_TARGET_ARCH: ${{ matrix.target_arch }}
        run: bun run --cwd apps/desktop validate:package-footprint

      - name: Create Windows checksum
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CHECKSUM_NAME: ${{ matrix.checksum_name }}
        run: |
          $installer = Get-ChildItem "apps/desktop/release" -Filter "*.exe" -File |
            Where-Object Name -NotLike "*.__uninstaller.exe" |
            Select-Object -First 1
          if (-not $installer) { throw "Windows installer not found" }
          $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *$($installer.Name)" | Set-Content "apps/desktop/release/$env:CHECKSUM_NAME" -Encoding ascii

      - name: Create macOS checksums
        if: runner.os == 'macOS'
        env:
          CHECKSUM_NAME: ${{ matrix.checksum_name }}
        run: |
          cd apps/desktop/release
          test -n "$(find . -maxdepth 1 -type f -name '*.dmg' -print -quit)" || {
            echo "::error::macOS DMG not found"
            exit 1
          }
          shasum -a 256 ./*.dmg > "$CHECKSUM_NAME"

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/release/*.exe
            !apps/desktop/release/*.__uninstaller.exe
            apps/desktop/release/${{ matrix.checksum_name }}
          retention-days: 1
          if-no-files-found: error

      - name: Upload macOS installers
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/${{ matrix.checksum_name }}
          retention-days: 1
          if-no-files-found: error

  archive:
    name: Publish rolling direct downloads
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download validated installers
        uses: actions/download-artifact@v8
        with:
          pattern: direct-*
          path: release-assets
          merge-multiple: true

      - name: Verify release inventory and checksums
        shell: bash
        run: |
          cd release-assets

          require_count() {
            local pattern="$1"
            local expected="$2"
            local actual
            actual=$(find . -maxdepth 1 -type f -name "$pattern" -print | wc -l | tr -d ' ')
            if [ "$actual" -ne "$expected" ]; then
              echo "::error::Expected $expected file(s) matching $pattern, found $actual"
              exit 1
            fi
          }

          require_count '*.exe' 1
          require_count '*.dmg' 2
          require_count '*.zip' 0
          require_count 'SHA256SUMS-*.txt' 3
          require_count '*-arm64.dmg' 1
          require_count '*-x64.dmg' 1

          for checksum in SHA256SUMS-*.txt; do
            sha256sum --check "$checksum"
          done

          WINDOWS_INSTALLER=$(find . -maxdepth 1 -type f -name '*.exe' -print -quit)
          MACOS_APPLE_SILICON=$(find . -maxdepth 1 -type f -name '*-arm64.dmg' -print -quit)
          MACOS_INTEL=$(find . -maxdepth 1 -type f -name '*-x64.dmg' -print -quit)

          mv "$WINDOWS_INSTALLER" ADE-Windows-x64.exe
          mv "$MACOS_APPLE_SILICON" ADE-macOS-Apple-Silicon.dmg
          mv "$MACOS_INTEL" ADE-macOS-Intel.dmg
          rm SHA256SUMS-*.txt

          sha256sum \
            ADE-Windows-x64.exe \
            ADE-macOS-Apple-Silicon.dmg \
            ADE-macOS-Intel.dmg \
            > SHA256SUMS.txt

      - name: Resolve desktop version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and verify personal update manifest
        env:
          ADE_VERSION: ${{ steps.version.outputs.version }}
          ADE_BUILD_SHA: ${{ github.sha }}
          ADE_BUILD_NUMBER: ${{ github.run_number }}
        shell: bash
        run: |
          COMMIT_DATE=$(git show -s --format=%cI "$GITHUB_SHA")
          export ADE_PUBLISHED_AT
          ADE_PUBLISHED_AT=$(date --utc --date="$COMMIT_DATE" +"%Y-%m-%dT%H:%M:%S.000Z")
          node .github/scripts/create-personal-update-manifest.cjs release-assets
          node .github/scripts/verify-update-manifests.cjs \
            release-assets/ade-personal-update-v1.json

      - name: Publish verified rolling direct downloads
        env:
          GH_TOKEN: ${{ github.token }}
          ADE_VERSION: ${{ steps.version.outputs.version }}
          ADE_BUILD_SHA: ${{ github.sha }}
          ADE_BUILD_NUMBER: ${{ github.run_number }}
          RELEASE_DIR: release-assets
        shell: bash
        run: bash .github/scripts/publish-direct-downloads.sh

      - name: Delete temporary staging artifacts
        uses: actions/github-script@v9
        with:
          retries: 3
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                ...context.repo,
                run_id: context.runId,
                per_page: 100,
              },
            );
            const stagingArtifacts = artifacts.filter(({ name }) =>
              name.startsWith("direct-"),
            );
            if (stagingArtifacts.length !== 3) {
              throw new Error(
                `Expected 3 direct-* staging artifacts, found ${stagingArtifacts.length}`,
              );
            }

            for (const artifact of stagingArtifacts) {
              await github.rest.actions.deleteArtifact({
                ...context.repo,
                artifact_id: artifact.id,
              });
              core.info(`Deleted temporary artifact ${artifact.name}`);
            }

            core.info(`Deleted ${stagingArtifacts.length} staging artifact(s)`);
