name: Personal Distribution Build

run-name: Personal distribution build from ${{ github.ref_name }} by @${{ github.actor }}

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: personal-distribution-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package unsigned - ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            target_arch: x64
            package_args: --win --x64
            artifact_name: personal-windows-x64
            checksum_name: SHA256SUMS-windows-x64.txt
          - name: macOS Apple Silicon
            runner: macos-15
            target_arch: arm64
            package_args: --mac --arm64
            artifact_name: personal-macos-arm64
            checksum_name: SHA256SUMS-macos-arm64.txt
          - name: macOS Intel
            runner: macos-15-intel
            target_arch: x64
            package_args: --mac --x64
            artifact_name: personal-macos-x64
            checksum_name: SHA256SUMS-macos-x64.txt

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen

      - name: Typecheck desktop
        run: bun run --cwd apps/desktop typecheck

      - name: Compile desktop
        run: bun run --cwd apps/desktop compile:app

      - name: Smoke native runtime
        run: bun run --cwd apps/desktop smoke:native

      - name: Package unsigned Windows installer
        if: runner.os == 'Windows'
        env:
          ADE_TARGET_ARCH: ${{ matrix.target_arch }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run --cwd apps/desktop package -- ${{ matrix.package_args }} --publish never --config electron-builder.ts

      - name: Package unsigned macOS installers
        if: runner.os == 'macOS'
        env:
          ADE_TARGET_ARCH: ${{ matrix.target_arch }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          for attempt in 1 2; do
            if bun run --cwd apps/desktop package -- ${{ matrix.package_args }} --publish never --config electron-builder.ts; then
              exit 0
            fi
            if [ "$attempt" -eq 2 ]; then
              echo "::error::macOS packaging failed twice"
              exit 1
            fi
            echo "::warning::macOS packaging hit a transient failure; retrying once after temporary disk images settle"
            sleep 15
          done

      - name: Confirm macOS build has no Developer ID signature
        if: runner.os == 'macOS'
        run: |
          APP_DIR=$(find apps/desktop/release -maxdepth 3 -name '*.app' -type d | head -1)
          test -n "$APP_DIR" || { echo "::error::Packaged .app not found"; exit 1; }
          if codesign --verify --deep --strict "$APP_DIR" 2>/dev/null && \
             codesign -dv --verbose=4 "$APP_DIR" 2>&1 | grep -q 'Authority=Developer ID Application:'; then
            echo "::error::Personal macOS artifact unexpectedly has a Developer ID signature"
            exit 1
          fi

      - name: Confirm Windows installer is unsigned
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem "apps/desktop/release" -Filter "*.exe" -File |
            Where-Object Name -NotLike "*.__uninstaller.exe" |
            Select-Object -First 1
          if (-not $installer) { throw "Windows installer not found" }
          $signature = Get-AuthenticodeSignature -LiteralPath $installer.FullName
          if ($signature.SignerCertificate) {
            throw "Personal Windows artifact unexpectedly has an Authenticode signature"
          }

      - name: Smoke packaged Windows runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:ELECTRON_RUN_AS_NODE = "1"
          $asar = (Resolve-Path "apps/desktop/release/win-unpacked/resources/app.asar").Path
          $env:ADE_SMOKE_MODULE_ROOT = "$asar/node_modules"
          $exe = (Resolve-Path "apps/desktop/release/win-unpacked/ADE.exe").Path
          $smokeScript = (Resolve-Path "apps/desktop/scripts/smoke-native-runtime.cjs").Path
          $process = Start-Process -FilePath $exe -ArgumentList @($smokeScript) -Wait -PassThru -NoNewWindow
          if ($process.ExitCode -ne 0) { throw "Packaged Windows runtime smoke failed with exit code $($process.ExitCode)" }

      - name: Smoke packaged macOS runtime
        if: runner.os == 'macOS'
        run: |
          APP_DIR=$(find apps/desktop/release -maxdepth 3 -name '*.app' -type d | head -1)
          test -n "$APP_DIR" || { echo "::error::Packaged .app not found"; exit 1; }
          APP_DIR=$(cd "$APP_DIR" && pwd -P)
          EXECUTABLE=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_DIR/Contents/Info.plist")
          test -n "$EXECUTABLE" || { echo "::error::CFBundleExecutable is missing"; exit 1; }
          export ELECTRON_RUN_AS_NODE=1
          export ADE_SMOKE_MODULE_ROOT="$APP_DIR/Contents/Resources/app.asar/node_modules"
          "$APP_DIR/Contents/MacOS/$EXECUTABLE" apps/desktop/scripts/smoke-native-runtime.cjs

      - name: Enforce personal package storage budget
        env:
          ADE_TARGET_ARCH: ${{ matrix.target_arch }}
        run: bun run --cwd apps/desktop validate:package-footprint

      - name: Create Windows checksum
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CHECKSUM_NAME: ${{ matrix.checksum_name }}
        run: |
          $installer = Get-ChildItem "apps/desktop/release" -Filter "*.exe" -File |
            Where-Object Name -NotLike "*.__uninstaller.exe" |
            Select-Object -First 1
          if (-not $installer) { throw "Windows installer not found" }
          $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *$($installer.Name)" | Set-Content "apps/desktop/release/$env:CHECKSUM_NAME" -Encoding ascii

      - name: Create macOS checksums
        if: runner.os == 'macOS'
        env:
          CHECKSUM_NAME: ${{ matrix.checksum_name }}
        run: |
          cd apps/desktop/release
          test -n "$(find . -maxdepth 1 -type f -name '*.dmg' -print -quit)" || {
            echo "::error::macOS DMG not found"
            exit 1
          }
          test -n "$(find . -maxdepth 1 -type f -name '*.zip' -print -quit)" || {
            echo "::error::macOS ZIP not found"
            exit 1
          }
          shasum -a 256 ./*.dmg ./*.zip > "$CHECKSUM_NAME"

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/release/*.exe
            !apps/desktop/release/*.__uninstaller.exe
            apps/desktop/release/${{ matrix.checksum_name }}
          retention-days: 1
          if-no-files-found: error

      - name: Upload macOS installers
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/${{ matrix.checksum_name }}
          retention-days: 1
          if-no-files-found: error

  archive:
    name: Archive persistent draft
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download validated installers
        uses: actions/download-artifact@v8
        with:
          pattern: personal-*
          path: release-assets
          merge-multiple: true

      - name: Verify release inventory and checksums
        shell: bash
        run: |
          cd release-assets

          require_count() {
            local pattern="$1"
            local expected="$2"
            local actual
            actual=$(find . -maxdepth 1 -type f -name "$pattern" -print | wc -l | tr -d ' ')
            if [ "$actual" -ne "$expected" ]; then
              echo "::error::Expected $expected file(s) matching $pattern, found $actual"
              exit 1
            fi
          }

          require_count '*.exe' 1
          require_count '*.dmg' 2
          require_count '*.zip' 2
          require_count 'SHA256SUMS-*.txt' 3

          for checksum in SHA256SUMS-*.txt; do
            sha256sum --check "$checksum"
          done

          sha256sum ./*.exe ./*.dmg ./*.zip > SHA256SUMS.txt

      - name: Resolve desktop version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create persistent draft release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: personal-v${{ steps.version.outputs.version }}-run.${{ github.run_id }}.${{ github.run_attempt }}
          target_commitish: ${{ github.sha }}
          name: ADE ${{ steps.version.outputs.version }} Personal Distribution Build ${{ github.run_number }}.${{ github.run_attempt }}
          body: |
            Unsigned personal distribution build from `${{ github.sha }}`.

            The installers passed the workflow's typecheck, compile, native-runtime smoke, package-footprint, signature-state, and checksum checks. This draft is retained until manually deleted and is excluded from ADE's stable update feed.

            Build log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          draft: true
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            release-assets/*.exe
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/SHA256SUMS*.txt

      - name: Delete temporary staging artifacts
        uses: actions/github-script@v9
        with:
          retries: 3
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                ...context.repo,
                run_id: context.runId,
                per_page: 100,
              },
            );
            const stagingArtifacts = artifacts.filter(({ name }) =>
              name.startsWith("personal-"),
            );
            if (stagingArtifacts.length !== 3) {
              throw new Error(
                `Expected 3 personal-* staging artifacts, found ${stagingArtifacts.length}`,
              );
            }

            for (const artifact of stagingArtifacts) {
              await github.rest.actions.deleteArtifact({
                ...context.repo,
                artifact_id: artifact.id,
              });
              core.info(`Deleted temporary artifact ${artifact.name}`);
            }

            core.info(`Deleted ${stagingArtifacts.length} staging artifact(s)`);
